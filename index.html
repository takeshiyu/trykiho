<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kiho — in-context English learning</title>
<meta name="description" content="Highlight English while you read — get AI explanations in context, keep them across visits, and review with spaced repetition. Bring your own key.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Crect x='1' y='1' width='126' height='126' rx='28' fill='%23e8dfc6' stroke='%23d5c8a8' stroke-width='2'/%3E%3Crect x='20' y='72' width='88' height='26' rx='13' fill='%235a7440'/%3E%3Ctext x='64' y='95' font-family='Georgia,serif' font-weight='700' font-size='92' fill='%2336332c' text-anchor='middle'%3Ek%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#fdfcf9; --ink:#36332c; --matcha:#5f7a43; --muted:#706c58; --border:#e5e1d3;
    --serif:'Source Serif 4',Georgia,'Songti TC','Noto Serif TC',serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Noto Sans TC',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
       display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
       -webkit-font-smoothing:antialiased}
  .card{max-width:560px}
  svg.logo{width:88px;height:88px;margin-bottom:20px}
  h1{font-family:var(--serif);font-weight:600;font-size:44px;letter-spacing:-1px;margin:0 0 12px}
  p.tag{font-size:19px;line-height:1.6;color:var(--ink);margin:0 auto 8px;max-width:460px}
  .hl{background:#cfe0b8;border-radius:6px;padding:0 6px;white-space:nowrap}
  p.sub{color:var(--muted);font-size:15px;margin:22px 0 28px}
  .links a{color:var(--matcha);text-decoration:none;font-weight:500;font-size:15px;
           border:1px solid var(--border);border-radius:10px;padding:9px 16px;display:inline-block;margin:4px}
  .links a:hover{background:#edeadf}
  footer{margin-top:36px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
  <div class="card">
    <svg class="logo" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="1" y="1" width="126" height="126" rx="28" fill="#e8dfc6" stroke="#d5c8a8" stroke-width="2"/>
      <rect x="20" y="72" width="88" height="26" rx="13" fill="#5a7440"/>
      <text x="64" y="95" font-family="'Source Serif 4',Georgia,serif" font-weight="660" font-size="92" fill="#36332c" text-anchor="middle">k</text>
    </svg>
    <h1>kiho</h1>
    <p class="tag">Highlight English <span class="hl">in context</span> — explain it, then remember it.</p>
    <p class="sub">Local-first · bring your own key · coming soon to the Chrome Web Store</p>
    <div class="links">
      <a href="/privacy">Privacy Policy</a>
      <a href="mailto:support@trykiho.app">Contact</a>
    </div>
    <footer>kiho — Taiwanese “kì-hō” (記號), a mark · © 2026</footer>
  </div>
</body>
</html>
